name: Build And Publish Theme Packager

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

env:
  ProjectPath: src/Altazion.Commerce.ThemePackager/Altazion.Commerce.ThemePackager.csproj
  DotNetVersion: 8.0.x

jobs:
  build:
    name: Build And Pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DotNetVersion }}

      - name: Compute package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.1.0-ci.${GITHUB_RUN_NUMBER}"
          fi

          echo "package_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Restore
        run: dotnet restore ${{ env.ProjectPath }}

      - name: Build
        run: dotnet build ${{ env.ProjectPath }} -c Release --no-restore

      - name: Pack
        run: >-
          dotnet pack ${{ env.ProjectPath }}
          -c Release
          --no-build
          -o ./artifacts
          /p:Version=${{ steps.version.outputs.package_version }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*.nupkg

  publish:
    name: Publish To NuGet
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: nuget

    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: artifacts

      - name: NuGet login with trusted publishing
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push package to nuget.org
        shell: bash
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate